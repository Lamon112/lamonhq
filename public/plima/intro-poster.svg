<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <!-- ============================================================ -->
  <!-- Plima intro video poster · premium cinematic dark ocean        -->
  <!-- Displayed as the cover image of the /plima intro video until    -->
  <!-- the user clicks Play. Replace with real video frame (JPG) when -->
  <!-- editing is final.                                              -->
  <!-- ============================================================ -->

  <defs>
    <!-- Deep ocean radial backdrop -->
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0c4a6e" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#031022" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Top cyan glow -->
    <radialGradient id="topGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom side warm glow -->
    <radialGradient id="sideGlow" cx="85%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <!-- Wave-line bright gradient (top wave) -->
    <linearGradient id="waveBright" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <!-- Wave-line standard gradient -->
    <linearGradient id="waveStd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="55%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>

    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>

    <!-- Wave grid mask gradient -->
    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Play icon glow -->
    <filter id="playGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Wave soft glow -->
    <filter id="waveGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#topGlow)"/>
  <rect width="1920" height="1080" fill="url(#sideGlow)"/>

  <!-- Subtle horizontal wave grid lines (parallax depth) -->
  <g opacity="0.15" mask="url(#gridMask)">
    <line x1="0" y1="700" x2="1920" y2="700" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="780" x2="1920" y2="780" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="860" x2="1920" y2="860" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="940" x2="1920" y2="940" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="1020" x2="1920" y2="1020" stroke="#06b6d4" stroke-width="1"/>
  </g>

  <!-- =================== PLIMA WAVE MARK (large, top center) =================== -->
  <g transform="translate(880,180) scale(2.4)">
    <!-- Wave 1 — small, top, lightest -->
    <path d="M 8 22 Q 18 16, 32 22 T 56 22"
          stroke="url(#waveBright)" stroke-width="3.2"
          stroke-linecap="round" fill="none"
          opacity="0.85" filter="url(#waveGlow)"/>
    <!-- Wave 2 — middle, medium -->
    <path d="M 5 34 Q 18 24, 32 34 T 59 34"
          stroke="url(#waveStd)" stroke-width="4"
          stroke-linecap="round" fill="none"
          filter="url(#waveGlow)"/>
    <!-- Wave 3 — bottom, biggest crest -->
    <path d="M 2 48 Q 18 32, 32 48 T 62 48"
          stroke="url(#waveStd)" stroke-width="5"
          stroke-linecap="round" fill="none"
          filter="url(#waveGlow)"/>
    <!-- Tide line -->
    <line x1="4" y1="56" x2="60" y2="56"
          stroke="#0ea5e9" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- =================== PLIMA WORDMARK =================== -->
  <text x="960" y="510" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="110" font-weight="700"
        letter-spacing="-2"
        fill="#ffffff">Plima</text>

  <!-- =================== TAGLINE =================== -->
  <text x="960" y="570" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="26" font-weight="400"
        letter-spacing="2"
        fill="#7dd3fc" opacity="0.85">
    PREMIUM PARTNER ZA RAST PRIVATNIH KLINIKA
  </text>

  <!-- =================== CENTRAL PLAY BUTTON =================== -->
  <g transform="translate(960,750)" filter="url(#playGlow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="64"
            fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.5"/>
    <!-- Inner disc -->
    <circle cx="0" cy="0" r="56"
            fill="#06b6d4" opacity="0.95"/>
    <!-- Play triangle -->
    <polygon points="-15,-22 -15,22 22,0" fill="#0c1f3d"/>
  </g>

  <!-- =================== "3 minute" badge below play =================== -->
  <text x="960" y="870" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="28" font-weight="500"
        fill="#cbd5e1" opacity="0.9">
    ~3 minute · uvodni razgovor
  </text>

  <!-- =================== Bottom right attribution =================== -->
  <text x="1820" y="1040" text-anchor="end"
        font-family="ui-monospace, monospace"
        font-size="18" font-weight="400"
        letter-spacing="3"
        fill="#94a3b8" opacity="0.7">
    LEONARDO LAMON · LAMON.IO/PLIMA
  </text>

  <!-- =================== Top left brand tag =================== -->
  <g transform="translate(100,80)">
    <rect x="0" y="0" width="200" height="40" rx="20"
          fill="rgba(6,182,212,0.15)" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.4"/>
    <circle cx="20" cy="20" r="5" fill="#22d3ee"/>
    <text x="38" y="26"
          font-family="Inter, system-ui, sans-serif"
          font-size="14" font-weight="500"
          letter-spacing="2"
          fill="#bae6fd">
      LAMON AGENCY
    </text>
  </g>

  <!-- =================== Vignette overlay (depth) =================== -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
